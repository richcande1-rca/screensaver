<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ambient Aquarium Prototype</title>
<style>
  :root{
    --bg:#05070b;
    --tank-w:min(62vw, 560px);
    --tank-h:min(86vh, 920px);

    --water-top:#18485f;
    --water-mid:#103547;
    --water-bottom:#08141d;

    --glass-border:rgba(255,255,255,0.12);
    --glass-highlight:rgba(255,255,255,0.08);
    --glass-shadow:rgba(0,0,0,0.45);

    --beam-a:rgba(255,255,255,0.13);
    --beam-b:rgba(255,255,255,0.00);

    --tank-glow:rgba(90,170,220,0.20);
    --ui-bg:rgba(10,14,18,0.72);
    --ui-border:rgba(255,255,255,0.10);
    --ui-text:#d8e7ef;

    --plant:rgba(26,73,60,0.85);
    --plant2:rgba(42,100,78,0.68);
    --wood:#3c2c1f;
    --gravel1:#3d4650;
    --gravel2:#59646d;
    --gravel3:#202830;

    --particle:rgba(230,245,255,0.18);
    --bubble:rgba(230,247,255,0.45);

    --tetra-a:#53d7ff;
    --tetra-b:#0c7fd3;
    --tetra-red:#ff4d5e;

    --angel-body:#d9eef5;
    --angel-fin:#8fd5ea;
    --bottom-fish:#b99c72;

    --fish-glow:drop-shadow(0 0 8px rgba(120,220,255,0.15));

    --mode-sat:1;
    --mode-bright:1;
    --mode-contrast:1;
    --mode-hue:0deg;
    --mode-overlay:rgba(0,0,0,0);
  }

  *{box-sizing:border-box}
  html,body{
    margin:0;
    height:100%;
    background:
      radial-gradient(circle at 50% 45%, rgba(20,35,55,0.22), transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(0,0,0,0.15), transparent 50%),
      linear-gradient(180deg, #05070b 0%, #020305 100%);
    overflow:hidden;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    color:var(--ui-text);
  }

  body{
    display:grid;
    place-items:center;
  }

  .stage{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
  }

  .room-vignette{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(circle at 50% 50%, transparent 18%, rgba(0,0,0,0.10) 55%, rgba(0,0,0,0.60) 100%),
      radial-gradient(circle at 50% 50%, rgba(80,170,210,0.06), transparent 24%);
  }

  .tank-wrap{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:var(--tank-w);
    height:var(--tank-h);
    display:flex;
    align-items:center;
    justify-content:center;
    filter:drop-shadow(0 18px 50px rgba(0,0,0,0.55))
           drop-shadow(0 0 35px var(--tank-glow));
  }

  .tank{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    border-radius:26px;
    border:1px solid var(--glass-border);
    background:
      linear-gradient(180deg,
        color-mix(in srgb, var(--water-top) 94%, white 6%) 0%,
        var(--water-mid) 38%,
        var(--water-bottom) 100%);
    box-shadow:
      inset 0 1px 0 var(--glass-highlight),
      inset 0 -30px 80px rgba(0,0,0,0.25),
      inset 24px 0 50px rgba(0,0,0,0.12),
      inset -24px 0 50px rgba(0,0,0,0.12),
      0 18px 40px var(--glass-shadow);
    isolation:isolate;
    filter:
      saturate(var(--mode-sat))
      brightness(var(--mode-bright))
      contrast(var(--mode-contrast))
      hue-rotate(var(--mode-hue));
  }

  .tank::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(90deg,
        rgba(255,255,255,0.06) 0%,
        rgba(255,255,255,0.015) 8%,
        transparent 18%,
        transparent 82%,
        rgba(255,255,255,0.015) 92%,
        rgba(255,255,255,0.055) 100%);
    mix-blend-mode:screen;
    z-index:50;
  }

  .tank::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:var(--mode-overlay);
    z-index:49;
  }

  .layer{
    position:absolute;
    inset:0;
    pointer-events:none;
  }

  .photo-bg{
    z-index:1;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.10), rgba(0,0,0,0.24)),
      url("./aquarium-bg.png") center center / cover no-repeat;
    filter:
      saturate(.92)
      brightness(.78)
      contrast(1.02)
      blur(1px);
    transform:scale(1.03);
    opacity:.92;
  }

  .back-haze{
    background:
      radial-gradient(circle at 50% 35%, rgba(160,220,255,0.09), transparent 26%),
      radial-gradient(circle at 26% 48%, rgba(120,220,180,0.05), transparent 22%),
      radial-gradient(circle at 75% 55%, rgba(120,220,180,0.04), transparent 26%);
    opacity:.9;
    animation:hazeDrift 18s ease-in-out infinite alternate;
  }

  .light-beams{
    z-index:3;
    overflow:hidden;
    mix-blend-mode:screen;
    opacity:.95;
  }

  .beam{
    position:absolute;
    top:-10%;
    width:18%;
    height:70%;
    background:linear-gradient(180deg, var(--beam-a), var(--beam-b));
    filter:blur(8px);
    transform-origin:top center;
    opacity:.7;
    animation:beamSway 10s ease-in-out infinite alternate;
  }

  .beam.b1{ left:20%; transform:rotate(-10deg); animation-duration:13s; }
  .beam.b2{ left:39%; transform:rotate(-3deg);  animation-duration:11s; opacity:.55;}
  .beam.b3{ left:56%; transform:rotate(7deg);   animation-duration:15s; opacity:.48;}

  .light-shimmer{
    z-index:4;
    left:0;
    top:0;
    width:100%;
    height:44%;
    opacity:.34;
    mix-blend-mode:screen;
    overflow:hidden;
    -webkit-mask-image:linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,.95) 38%, rgba(0,0,0,.45) 72%, rgba(0,0,0,0) 100%);
    mask-image:linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,.95) 38%, rgba(0,0,0,.45) 72%, rgba(0,0,0,0) 100%);
  }

  .light-shimmer::before{
    content:"";
    position:absolute;
    inset:-8% -20%;
    background:
      repeating-linear-gradient(
        103deg,
        rgba(255,255,255,0.00) 0px,
        rgba(255,255,255,0.00) 18px,
        rgba(255,255,255,0.20) 28px,
        rgba(255,255,255,0.08) 38px,
        rgba(255,255,255,0.00) 54px,
        rgba(255,255,255,0.00) 78px
      ),
      repeating-linear-gradient(
        79deg,
        rgba(180,220,255,0.00) 0px,
        rgba(180,220,255,0.12) 16px,
        rgba(180,220,255,0.00) 34px,
        rgba(255,255,255,0.10) 48px,
        rgba(255,255,255,0.00) 72px
      );
    filter:blur(1.5px);
    transform:translateX(0) translateY(0) scale(1.04);
    animation:topShimmerMove 4.8s linear infinite;
  }

  .scenery{
    z-index:5;
    opacity:0;
  }

  .wood{
    position:absolute;
    background:linear-gradient(180deg, #4b3525 0%, #2e2118 100%);
    box-shadow:inset 0 0 12px rgba(255,255,255,0.05), inset 0 -12px 20px rgba(0,0,0,0.2);
    opacity:.95;
  }

  .wood.left{
    left:6%;
    bottom:11%;
    width:22%;
    height:42%;
    border-radius:48% 46% 28% 30% / 18% 22% 58% 55%;
    transform:rotate(-18deg);
  }

  .wood.right{
    right:8%;
    bottom:12%;
    width:18%;
    height:34%;
    border-radius:34% 54% 22% 32% / 20% 22% 56% 50%;
    transform:rotate(18deg);
  }

  .branch{
    position:absolute;
    background:linear-gradient(180deg, #5a3d2c, #2d2018);
    border-radius:999px;
    transform-origin:left center;
    opacity:.92;
  }

  .branch.l1{ left:16%; bottom:42%; width:16%; height:2.2%; transform:rotate(-28deg);}
  .branch.l2{ left:19%; bottom:30%; width:12%; height:1.8%; transform:rotate(14deg);}
  .branch.r1{ right:16%; bottom:36%; width:12%; height:1.9%; transform:rotate(38deg);}
  .branch.r2{ right:18%; bottom:24%; width:10%; height:1.5%; transform:rotate(-24deg);}

  .gravel{
    position:absolute;
    left:0; right:0; bottom:0;
    height:17%;
    background:
      radial-gradient(circle at 15% 40%, var(--gravel2) 0 2px, transparent 2.5px) 0 0/18px 14px,
      radial-gradient(circle at 60% 60%, var(--gravel1) 0 2.2px, transparent 2.8px) 0 0/21px 16px,
      radial-gradient(circle at 35% 40%, var(--gravel3) 0 1.8px, transparent 2.4px) 0 0/16px 13px,
      linear-gradient(180deg, #56606b 0%, #343c45 40%, #262d35 100%);
    box-shadow:inset 0 10px 20px rgba(255,255,255,0.05);
  }

  .plant{
    position:absolute;
    bottom:12%;
    width:10%;
    height:34%;
    transform-origin:bottom center;
    animation:plantSway 6s ease-in-out infinite alternate;
    opacity:.9;
  }

  .plant::before,
  .plant::after{
    content:"";
    position:absolute;
    bottom:0;
    width:34%;
    height:100%;
    border-radius:60% 40% 60% 40% / 90% 90% 10% 10%;
    background:linear-gradient(180deg, var(--plant2) 0%, var(--plant) 60%, rgba(10,35,24,0.95) 100%);
    filter:blur(.2px);
  }

  .plant::before{ left:22%; transform:rotate(-10deg);}
  .plant::after{ left:48%; transform:rotate(12deg);}
  .p1{ left:6%; height:26%; animation-duration:7.8s;}
  .p2{ left:12%; height:31%; animation-duration:6.2s;}
  .p3{ left:28%; height:21%; animation-duration:7.1s;}
  .p4{ left:68%; height:24%; animation-duration:6.8s;}
  .p5{ left:79%; height:28%; animation-duration:8.4s;}
  .p6{ left:86%; height:20%; animation-duration:5.9s;}

  .diver-layer{
    z-index:6;
    pointer-events:none;
  }

  .diver-ornament{
    position:absolute;
    left:10%;
    bottom:9%;
    width:20%;
    max-width:120px;
    opacity:.92;
    filter:
      drop-shadow(0 8px 14px rgba(0,0,0,0.28))
      drop-shadow(0 0 8px rgba(255,210,120,0.08));
    transform-origin:50% 85%;
    animation:diverBob 4.8s ease-in-out infinite alternate;
  }

  .particles, .bubbles, .fish-layer, .ripple, .glass-reflection{
    z-index:10;
  }

  .particle{
    position:absolute;
    width:4px;
    height:4px;
    border-radius:50%;
    background:var(--particle);
    filter:blur(.2px);
  }

  .bubble{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.35);
    background:radial-gradient(circle at 35% 35%, rgba(255,255,255,0.45), rgba(255,255,255,0.05) 55%, transparent 65%);
    box-shadow:inset -1px -1px 3px rgba(255,255,255,0.18);
    opacity:.7;
  }

  .fish{
    position:absolute;
    will-change:transform;
    filter:var(--fish-glow);
  }

  .tetra{
    width:44px;
    height:22px;
  }
  .tetra .body{
    position:absolute;
    left:8px; top:4px;
    width:22px; height:14px;
    background:linear-gradient(90deg, var(--tetra-a), #bff6ff 55%, var(--tetra-b));
    clip-path:polygon(0% 50%, 22% 5%, 80% 8%, 100% 50%, 78% 92%, 20% 92%);
    border-radius:40% 50% 50% 40%;
  }
  .tetra .tail{
    position:absolute;
    left:0; top:5px;
    width:12px; height:12px;
    background:linear-gradient(90deg, rgba(70,200,255,0.9), rgba(70,200,255,0.2));
    clip-path:polygon(100% 50%, 0 0, 0 100%);
    transform-origin:right center;
    animation:tailWag .9s ease-in-out infinite alternate;
  }
  .tetra .stripe{
    position:absolute;
    left:14px; top:9px;
    width:17px; height:4px;
    background:linear-gradient(90deg, #0d0f15, #1c2432, #0f1118);
    border-radius:999px;
    opacity:.8;
  }
  .tetra .red{
    position:absolute;
    left:14px; top:13px;
    width:13px; height:4px;
    background:linear-gradient(90deg, #ff5b6b, #ff2a43);
    border-radius:999px;
  }
  .tetra .eye{
    position:absolute;
    left:26px; top:7px;
    width:2.8px; height:2.8px;
    background:#091015;
    border-radius:50%;
  }

  .angel{
    width:86px;
    height:110px;
  }
  .angel .body{
    position:absolute;
    left:24px; top:24px;
    width:38px; height:44px;
    background:linear-gradient(180deg, #f0fbff 0%, #cfe4ea 100%);
    border-radius:52% 48% 48% 52% / 46% 46% 54% 54%;
    box-shadow:inset -8px 0 10px rgba(0,0,0,0.08);
  }
  .angel .dorsal{
    position:absolute;
    left:30px; top:0;
    width:18px; height:34px;
    background:linear-gradient(180deg, rgba(210,245,255,0.9), rgba(130,210,235,0.25));
    clip-path:polygon(50% 0, 100% 100%, 0 100%);
  }
  .angel .ventral{
    position:absolute;
    left:34px; top:62px;
    width:16px; height:44px;
    background:linear-gradient(180deg, rgba(170,230,245,0.9), rgba(130,210,235,0.05));
    clip-path:polygon(50% 100%, 0 0, 100% 0);
  }
  .angel .tail{
    position:absolute;
    left:10px; top:34px;
    width:22px; height:34px;
    background:linear-gradient(90deg, rgba(170,230,245,0.95), rgba(170,230,245,0.18));
    clip-path:polygon(100% 50%, 0 0, 0 100%);
    transform-origin:right center;
    animation:tailWag 1.4s ease-in-out infinite alternate;
  }
  .angel .fin1, .angel .fin2{
    position:absolute;
    width:2px; height:36px;
    background:linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.05));
    border-radius:999px;
  }
  .angel .fin1{ left:38px; top:70px; transform:rotate(10deg);}
  .angel .fin2{ left:46px; top:71px; transform:rotate(-5deg);}
  .angel .eye{
    position:absolute;
    left:50px; top:38px;
    width:4px; height:4px;
    background:#081117;
    border-radius:50%;
  }

  .bottomfish{
    width:58px;
    height:26px;
  }
  .bottomfish .body{
    position:absolute;
    left:8px; top:7px;
    width:30px; height:12px;
    background:linear-gradient(90deg, #8e7757, #d3bc95 55%, #8d7551);
    clip-path:polygon(0 50%, 15% 15%, 78% 8%, 100% 50%, 78% 92%, 15% 85%);
    border-radius:50%;
  }
  .bottomfish .tail{
    position:absolute;
    left:0; top:8px;
    width:10px; height:10px;
    background:linear-gradient(90deg, rgba(190,160,115,0.95), rgba(190,160,115,0.15));
    clip-path:polygon(100% 50%, 0 0, 0 100%);
    transform-origin:right center;
    animation:tailWag 1s ease-in-out infinite alternate;
  }
  .bottomfish .eye{
    position:absolute;
    left:31px; top:10px;
    width:2.5px; height:2.5px;
    background:#111;
    border-radius:50%;
  }
  .bottomfish .barb1, .bottomfish .barb2{
    position:absolute;
    width:10px; height:1px;
    background:rgba(240,230,200,0.55);
    left:35px; top:14px;
    transform-origin:left center;
  }
  .bottomfish .barb1{ transform:rotate(12deg);}
  .bottomfish .barb2{ transform:rotate(-10deg);}

  .ripple{
    z-index:20;
    opacity:.14;
    mix-blend-mode:screen;
    background:
      repeating-linear-gradient(
        100deg,
        rgba(255,255,255,0.18) 0px,
        rgba(255,255,255,0.06) 6px,
        rgba(255,255,255,0.00) 20px,
        rgba(255,255,255,0.05) 34px,
        rgba(255,255,255,0.00) 54px
      );
    filter:blur(8px);
    animation:rippleShift 11s linear infinite;
  }

  .glass-reflection{
    z-index:30;
    background:
      linear-gradient(112deg,
        transparent 0%,
        transparent 58%,
        rgba(255,255,255,0.06) 66%,
        rgba(255,255,255,0.00) 74%,
        transparent 82%);
    opacity:.75;
  }

  .controls{
    position:absolute;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    z-index:100;
    display:flex;
    gap:8px;
    align-items:center;
    padding:8px;
    border:1px solid var(--ui-border);
    border-radius:16px;
    background:var(--ui-bg);
    backdrop-filter:blur(8px);
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
  }

  .controls button{
    appearance:none;
    border:1px solid rgba(255,255,255,0.11);
    background:rgba(255,255,255,0.06);
    color:var(--ui-text);
    padding:8px 12px;
    border-radius:12px;
    font-size:13px;
    cursor:pointer;
    transition:.18s ease;
  }
  .controls button:hover{
    background:rgba(255,255,255,0.11);
    transform:translateY(-1px);
  }
  .controls button.active{
    background:rgba(120,210,255,0.16);
    border-color:rgba(150,230,255,0.25);
    box-shadow:0 0 0 1px rgba(150,230,255,0.08) inset;
  }

  .title{
    position:absolute;
    top:18px;
    left:50%;
    transform:translateX(-50%);
    z-index:100;
    font-size:14px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:rgba(225,240,248,0.80);
    background:rgba(8,12,18,0.40);
    padding:8px 12px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(6px);
  }

  @keyframes tailWag{
    from{ transform:rotate(-8deg);}
    to{ transform:rotate(8deg);}
  }

  @keyframes plantSway{
    from{ transform:rotate(-2.5deg);}
    to{ transform:rotate(3.5deg);}
  }

  @keyframes beamSway{
    from{ transform:translateY(0) rotate(-8deg);}
    to{ transform:translateY(1.5%) rotate(-4deg);}
  }

  @keyframes hazeDrift{
    from{ transform:translateX(-1.2%) translateY(-0.5%);}
    to{ transform:translateX(1.2%) translateY(0.8%);}
  }

  @keyframes rippleShift{
    from{ transform:translateX(-4%) translateY(-1%) scale(1.02);}
    to{ transform:translateX(4%) translateY(1%) scale(1.04);}
  }

  @keyframes topShimmerMove{
    0%{
      transform:translateX(-8%) translateY(0%) scale(1.04);
    }
    50%{
      transform:translateX(2%) translateY(1.2%) scale(1.07);
    }
    100%{
      transform:translateX(10%) translateY(0%) scale(1.04);
    }
  }

  @keyframes diverBob{
    from{
      transform:translateY(0px) rotate(-1deg);
    }
    to{
      transform:translateY(-4px) rotate(1deg);
    }
  }

  @media (max-width: 800px){
    :root{
      --tank-w:min(92vw, 460px);
      --tank-h:min(82vh, 760px);
    }
    .controls{
      flex-wrap:wrap;
      max-width:94vw;
      justify-content:center;
    }
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="room-vignette"></div>

    <div class="tank-wrap">
      <div class="tank" id="tank">
        <div class="layer photo-bg"></div>
        <div class="layer back-haze"></div>

        <div class="layer light-beams">
          <div class="beam b1"></div>
          <div class="beam b2"></div>
          <div class="beam b3"></div>
        </div>

        <div class="layer light-shimmer"></div>

        <div class="layer scenery">
          <div class="wood left"></div>
          <div class="wood right"></div>
          <div class="branch l1"></div>
          <div class="branch l2"></div>
          <div class="branch r1"></div>
          <div class="branch r2"></div>

          <div class="plant p1"></div>
          <div class="plant p2"></div>
          <div class="plant p3"></div>
          <div class="plant p4"></div>
          <div class="plant p5"></div>
          <div class="plant p6"></div>

          <div class="gravel"></div>
        </div>

        <div class="layer diver-layer">
          <img src="./diver.png" alt="" class="diver-ornament" id="diverOrnament">
        </div>

        <div class="layer particles" id="particles"></div>
        <div class="layer bubbles" id="bubbles"></div>
        <div class="layer fish-layer" id="fishLayer"></div>
        <div class="layer ripple"></div>
        <div class="layer glass-reflection"></div>
      </div>
    </div>

    <div class="title">Ambient Aquarium</div>

    <div class="controls">
      <button class="modeBtn active" data-mode="day">Day</button>
      <button class="modeBtn" data-mode="moon">Moon</button>
      <button class="modeBtn" data-mode="uv">UV</button>
    </div>
  </div>

<script>
(() => {
  const tank = document.getElementById('tank');
  const fishLayer = document.getElementById('fishLayer');
  const particlesEl = document.getElementById('particles');
  const bubblesEl = document.getElementById('bubbles');
  const modeBtns = [...document.querySelectorAll('.modeBtn')];

  const mouse = { x: 0.5, y: 0.5, inside: false };
  const fish = [];
  const particles = [];
  const bubbles = [];
  const diverBubbles = [];

  const FISH_SPEED = 5.0;

  function rand(a, b) { return a + Math.random() * (b - a); }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function lerp(a, b, t) { return a + (b - a) * t; }

  function makeEl(html) {
    const wrap = document.createElement('div');
    wrap.innerHTML = html.trim();
    return wrap.firstChild;
  }

  function chooseTargetForFish(f) {
    if (f.type === 'angel') {
      f.targetX = rand(0.40, 0.66);
      f.targetY = rand(0.24, 0.46);
    } else if (f.type === 'tetra') {
      const cx = 0.50;
      const cy = 0.41;
      f.targetX = clamp(cx + rand(-0.16, 0.16), 0.30, 0.70);
      f.targetY = clamp(cy + rand(-0.10, 0.10), 0.29, 0.53);
    } else {
      f.targetX = rand(0.30, 0.67);
      f.targetY = rand(0.73, 0.83);
    }
  }

  function pickState(f, force) {
    if (force) {
      f.state = force;
    } else {
      const r = Math.random();
      if (f.type === 'tetra') {
        if (r < 0.12) f.state = 'idle';
        else if (r < 0.86) f.state = 'cruise';
        else if (r < 0.95) f.state = 'turn';
        else f.state = 'dart';
      } else if (f.type === 'angel') {
        if (r < 0.24) f.state = 'idle';
        else if (r < 0.88) f.state = 'cruise';
        else if (r < 0.97) f.state = 'turn';
        else f.state = 'dart';
      } else {
        if (r < 0.30) f.state = 'idle';
        else if (r < 0.88) f.state = 'cruise';
        else if (r < 0.98) f.state = 'turn';
        else f.state = 'dart';
      }
    }

    if (f.state === 'idle') {
      f.stateTimer = rand(1.8, 4.8);
    } else if (f.state === 'cruise') {
      f.stateTimer = rand(2.5, 6.5);
      chooseTargetForFish(f);
    } else if (f.state === 'turn') {
      f.stateTimer = rand(0.7, 1.8);
      chooseTargetForFish(f);
    } else if (f.state === 'dart') {
      f.stateTimer = rand(0.35, 0.9);
      chooseTargetForFish(f);
      f.targetX += rand(-0.08, 0.08);
      f.targetY += rand(-0.06, 0.06);
    }
  }

  function makeFishBase(type, el, x, y, scale) {
    const f = {
      type,
      el,
      x, y,
      vx: 0,
      vy: 0,
      dir: 1,
      angle: 0,
      displayAngle: 0,
      bobT: Math.random() * 10,
      schoolPhase: Math.random() * 6.28,
      scale,
      targetX: x,
      targetY: y,
      state: 'cruise',
      stateTimer: rand(2, 5),
      cruiseSpeed: 0.00010,
      dartSpeed: 0.00022,
      accel: 0.006,
      drag: 0.991,
      turnEase: 0.045,
      wander: rand(0.8, 1.2),
      shyness: rand(0.8, 1.2),
      idleBob: rand(0.8, 1.2),
      depthOffset: rand(-0.006, 0.006)
    };
    chooseTargetForFish(f);
    pickState(f, 'cruise');
    return f;
  }

  function createTetra(x, y, scale = 1, hue = 0) {
    const el = makeEl(`
      <div class="fish tetra">
        <div class="tail"></div>
        <div class="body"></div>
        <div class="stripe"></div>
        <div class="red"></div>
        <div class="eye"></div>
      </div>
    `);
    el.style.scale = scale;
    if (hue) el.style.filter = `hue-rotate(${hue}deg) var(--fish-glow)`;
    fishLayer.appendChild(el);

    const f = makeFishBase('tetra', el, x, y, scale);
    f.cruiseSpeed = rand(0.00010, 0.00016);
    f.dartSpeed = rand(0.00024, 0.00034);
    f.accel = rand(0.006, 0.010);
    f.drag = rand(0.988, 0.993);
    f.turnEase = rand(0.05, 0.08);
    fish.push(f);
  }

  function createAngel(x, y, scale = 1) {
    const el = makeEl(`
      <div class="fish angel">
        <div class="tail"></div>
        <div class="dorsal"></div>
        <div class="body"></div>
        <div class="ventral"></div>
        <div class="fin1"></div>
        <div class="fin2"></div>
        <div class="eye"></div>
      </div>
    `);
    el.style.scale = scale;
    fishLayer.appendChild(el);

    const f = makeFishBase('angel', el, x, y, scale);
    f.cruiseSpeed = rand(0.00006, 0.00010);
    f.dartSpeed = rand(0.00015, 0.00022);
    f.accel = rand(0.004, 0.007);
    f.drag = rand(0.990, 0.994);
    f.turnEase = rand(0.035, 0.05);
    fish.push(f);
  }

  function createBottomFish(x, y, scale = 1) {
    const el = makeEl(`
      <div class="fish bottomfish">
        <div class="tail"></div>
        <div class="body"></div>
        <div class="eye"></div>
        <div class="barb1"></div>
        <div class="barb2"></div>
      </div>
    `);
    el.style.scale = scale;
    fishLayer.appendChild(el);

    const f = makeFishBase('bottom', el, x, y, scale);
    f.cruiseSpeed = rand(0.00005, 0.00009);
    f.dartSpeed = rand(0.00012, 0.00018);
    f.accel = rand(0.004, 0.007);
    f.drag = rand(0.989, 0.994);
    f.turnEase = rand(0.04, 0.06);
    fish.push(f);
  }

  function createParticle() {
    const el = document.createElement('div');
    el.className = 'particle';
    particlesEl.appendChild(el);

    particles.push({
      el,
      x: Math.random(),
      y: Math.random(),
      vx: (Math.random() - 0.5) * 0.00008,
      vy: -(0.00008 + Math.random() * 0.00012),
      size: 2 + Math.random() * 3,
      drift: Math.random() * 100,
      a: 0.08 + Math.random() * 0.18
    });
  }

  function createBubble(xNorm) {
    const el = document.createElement('div');
    el.className = 'bubble';
    bubblesEl.appendChild(el);

    bubbles.push({
      el,
      x: xNorm,
      y: 1.02 + Math.random() * 0.15,
      vx: (Math.random() - 0.5) * 0.00012,
      vy: 0.00045 + Math.random() * 0.00035,
      size: 5 + Math.random() * 10,
      wobble: Math.random() * 100
    });
  }

  function createDiverBubble() {
    const el = document.createElement('div');
    el.className = 'bubble';
    bubblesEl.appendChild(el);

    diverBubbles.push({
      el,
      x: 0.185,
      y: 0.79,
      vx: (Math.random() - 0.5) * 0.00005,
      vy: 0.00052 + Math.random() * 0.00022,
      size: 4 + Math.random() * 7,
      wobble: Math.random() * 100
    });
  }

  function seedScene() {
    createAngel(0.53, 0.30, 1.00);

    createTetra(0.41, 0.36, 0.95);
    createTetra(0.47, 0.40, 0.86);
    createTetra(0.58, 0.43, 0.92);
    createTetra(0.64, 0.37, 0.88);
    createTetra(0.36, 0.46, 0.80);

    createBottomFish(0.35, 0.78, 0.95);
    createBottomFish(0.62, 0.80, 0.90);

    for (let i = 0; i < 55; i++) createParticle();
    for (let i = 0; i < 18; i++) createBubble(0.29 + Math.random() * 0.08);
    for (let i = 0; i < 10; i++) createDiverBubble();
  }

  function setMode(mode) {
    modeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));

    const r = document.documentElement.style;
    if (mode === 'day') {
      r.setProperty('--water-top', '#18485f');
      r.setProperty('--water-mid', '#103547');
      r.setProperty('--water-bottom', '#08141d');
      r.setProperty('--tank-glow', 'rgba(90,170,220,0.20)');
      r.setProperty('--beam-a', 'rgba(255,255,255,0.13)');
      r.setProperty('--beam-b', 'rgba(255,255,255,0.00)');
      r.setProperty('--mode-sat', '1');
      r.setProperty('--mode-bright', '1');
      r.setProperty('--mode-contrast', '1');
      r.setProperty('--mode-hue', '0deg');
      r.setProperty('--mode-overlay', 'rgba(0,0,0,0)');
    } else if (mode === 'moon') {
      r.setProperty('--water-top', '#0f2745');
      r.setProperty('--water-mid', '#0b1832');
      r.setProperty('--water-bottom', '#040a15');
      r.setProperty('--tank-glow', 'rgba(80,130,255,0.16)');
      r.setProperty('--beam-a', 'rgba(150,190,255,0.16)');
      r.setProperty('--beam-b', 'rgba(150,190,255,0.00)');
      r.setProperty('--mode-sat', '.90');
      r.setProperty('--mode-bright', '.90');
      r.setProperty('--mode-contrast', '1.05');
      r.setProperty('--mode-hue', '-6deg');
      r.setProperty('--mode-overlay', 'linear-gradient(180deg, rgba(12,20,46,0.10), rgba(8,14,30,0.18))');
    } else if (mode === 'uv') {
      r.setProperty('--water-top', '#241045');
      r.setProperty('--water-mid', '#140c2f');
      r.setProperty('--water-bottom', '#090413');
      r.setProperty('--tank-glow', 'rgba(170,90,255,0.22)');
      r.setProperty('--beam-a', 'rgba(180,100,255,0.18)');
      r.setProperty('--beam-b', 'rgba(180,100,255,0.00)');
      r.setProperty('--mode-sat', '1.22');
      r.setProperty('--mode-bright', '.98');
      r.setProperty('--mode-contrast', '1.08');
      r.setProperty('--mode-hue', '18deg');
      r.setProperty('--mode-overlay', 'linear-gradient(180deg, rgba(70,20,100,0.10), rgba(25,8,45,0.16))');
    }
  }

  let last = performance.now();

  function animate(now) {
    const dt = Math.min(33, now - last);
    const dtSec = dt / 1000;
    last = now;
    const t = now * 0.001;
    const tankRect = tank.getBoundingClientRect();
    const mx = mouse.x;
    const my = mouse.y;

    for (const p of particles) {
      p.drift += dt * 0.0007;
      p.x += p.vx * dt + Math.sin(p.drift * 0.5) * 0.00002;
      p.y += p.vy * dt;

      if (p.y < -0.03) {
        p.y = 1.03;
        p.x = Math.random();
      }
      if (p.x < -0.03) p.x = 1.03;
      if (p.x > 1.03) p.x = -0.03;

      p.el.style.width = `${p.size}px`;
      p.el.style.height = `${p.size}px`;
      p.el.style.opacity = p.a + 0.03 * Math.sin(t + p.drift);
      p.el.style.transform = `translate(${p.x * tankRect.width}px, ${p.y * tankRect.height}px)`;
    }

    for (const b of bubbles) {
      b.wobble += dt * 0.0016;
      b.y -= b.vy * dt;
      b.x += b.vx * dt + Math.sin(b.wobble) * 0.00010;

      if (b.y < -0.06) {
        b.y = 1.05 + Math.random() * 0.15;
        b.x = 0.29 + Math.random() * 0.08;
      }

      const s = b.size * (0.96 + 0.06 * Math.sin(b.wobble * 1.4));
      b.el.style.width = `${s}px`;
      b.el.style.height = `${s}px`;
      b.el.style.transform = `translate(${b.x * tankRect.width}px, ${b.y * tankRect.height}px)`;
      b.el.style.opacity = 0.35 + ((1 - b.y) * 0.22);
    }

    for (const b of diverBubbles) {
      b.wobble += dt * 0.0018;
      b.y -= b.vy * dt;
      b.x += b.vx * dt + Math.sin(b.wobble * 1.15) * 0.00008;

      if (b.y < 0.40) {
        b.x = 0.185 + (Math.random() - 0.5) * 0.018;
        b.y = 0.79 + Math.random() * 0.015;
      }

      const s = b.size * (0.95 + 0.08 * Math.sin(b.wobble * 1.5));
      b.el.style.width = `${s}px`;
      b.el.style.height = `${s}px`;
      b.el.style.transform = `translate(${b.x * tankRect.width}px, ${b.y * tankRect.height}px)`;
      b.el.style.opacity = 0.42 + ((1 - b.y) * 0.26);
    }

    const tetraList = fish.filter(f => f.type === 'tetra');
    let tetraCenterX = 0.5;
    let tetraCenterY = 0.4;
    if (tetraList.length) {
      tetraCenterX = tetraList.reduce((s, f) => s + f.x, 0) / tetraList.length;
      tetraCenterY = tetraList.reduce((s, f) => s + f.y, 0) / tetraList.length;
    }

    for (const f of fish) {
      f.stateTimer -= dtSec;
      f.bobT += dtSec * 2.0;

      if (f.stateTimer <= 0) pickState(f);

      const dxm = f.x - mx;
      const dym = f.y - my;
      const dist2 = dxm * dxm + dym * dym;

      let repelX = 0;
      let repelY = 0;
      if (mouse.inside && dist2 < 0.05) {
        const strength = (0.05 - dist2) * 0.015 * f.shyness;
        repelX = dxm * strength;
        repelY = dym * strength;
        if (f.state !== 'dart' && dist2 < 0.012) {
          pickState(f, 'dart');
        }
      }

      if (f.type === 'tetra') {
        f.targetX += (tetraCenterX - f.targetX) * 0.010 * f.wander;
        f.targetY += (tetraCenterY - f.targetY) * 0.010 * f.wander;
      }

      const tx = f.targetX - f.x;
      const ty = f.targetY - f.y;
      const dist = Math.hypot(tx, ty) || 0.00001;

      if (dist < 0.02 && (f.state === 'cruise' || f.state === 'turn')) {
        if (Math.random() < 0.02) {
          pickState(f, 'idle');
        } else {
          chooseTargetForFish(f);
        }
      }

      let desiredSpeed = 0;
      if (f.state === 'idle') desiredSpeed = f.cruiseSpeed * 0.10;
      if (f.state === 'turn') desiredSpeed = f.cruiseSpeed * 0.55;
      if (f.state === 'cruise') desiredSpeed = f.cruiseSpeed;
      if (f.state === 'dart') desiredSpeed = f.dartSpeed;

      const desiredVX = (tx / dist) * desiredSpeed * FISH_SPEED + repelX;
      const desiredVY = (ty / dist) * desiredSpeed * FISH_SPEED + repelY;

      f.vx = lerp(f.vx, desiredVX, f.accel);
      f.vy = lerp(f.vy, desiredVY, f.accel);

      if (f.state === 'idle') {
        f.vx *= 0.992;
        f.vy *= 0.992;
      } else {
        f.vx *= f.drag;
        f.vy *= f.drag;
      }

      f.x += f.vx * dt;
      f.y += f.vy * dt;

      if (f.type === 'angel') {
        f.x = clamp(f.x, 0.38, 0.68);
        f.y = clamp(f.y, 0.23, 0.48);
      } else if (f.type === 'tetra') {
        f.x = clamp(f.x, 0.28, 0.72);
        f.y = clamp(f.y, 0.28, 0.54);
      } else {
        f.x = clamp(f.x, 0.28, 0.68);
        f.y = clamp(f.y, 0.72, 0.84);
      }

      const moveAngle = Math.atan2(f.vy, f.vx || 0.00001);
      f.angle = lerp(f.angle, moveAngle, f.turnEase);

      const speedMag = Math.hypot(f.vx, f.vy);
      if (Math.abs(f.vx) > 0.000001) {
        f.dir = f.vx < 0 ? -1 : 1;
      }

      const tailBoost =
        f.state === 'dart' ? 2.0 :
        f.state === 'cruise' ? 1.0 :
        f.state === 'turn' ? 0.7 : 0.35;

      const bodyBob =
        f.state === 'idle'
          ? Math.sin(f.bobT * 1.5 + f.schoolPhase) * 0.0012 * f.idleBob
          : Math.sin(f.bobT * 1.8 + f.schoolPhase) * 0.0008 * f.idleBob;

      const extraSchoolY = f.type === 'tetra'
        ? Math.sin(t * 0.7 + f.schoolPhase) * 0.0014
        : 0;

      const drawY = f.y + bodyBob + extraSchoolY + f.depthOffset;
      const rotDeg = (f.angle * 180 / Math.PI) * 0.33;
      const tailDeg = Math.sin(t * 10 * tailBoost + f.schoolPhase * 2) * (speedMag * 9000);
      const finalRot = rotDeg + clamp(tailDeg, -8, 8);

      f.el.style.opacity = f.type === 'tetra' ? '0.96' : '1';
      f.el.style.transform =
        `translate(${f.x * tankRect.width}px, ${drawY * tankRect.height}px) translate(-50%,-50%) scale(${f.dir * f.scale}, ${f.scale}) rotate(${finalRot}deg)`;
    }

    requestAnimationFrame(animate);
  }

  tank.addEventListener('mousemove', (e) => {
    const r = tank.getBoundingClientRect();
    mouse.x = (e.clientX - r.left) / r.width;
    mouse.y = (e.clientY - r.top) / r.height;
    mouse.inside = true;
  });

  tank.addEventListener('mouseleave', () => {
    mouse.inside = false;
    mouse.x = 0.5;
    mouse.y = 0.5;
  });

  modeBtns.forEach(btn => {
    btn.addEventListener('click', () => setMode(btn.dataset.mode));
  });

  seedScene();
  setMode('day');
  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
